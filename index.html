<!DOCTYPE html>
<html>
<head>
    <title>Water Reminder</title>
</head>
<body style="text-align:center; font-family:sans-serif; margin-top:50px;">

    <h1>💧 Water Reminder</h1>

    <button onclick="startReminder()">
        Start Reminder
    </button>

    <script>
        function startReminder() {
            if (window.Android) {
                window.Android.startReminder();
                alert("Reminder started!");
            } else {
                alert("Android interface not available");
            }
        }
    </script>

</body>
</html>
